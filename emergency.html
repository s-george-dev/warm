<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Connecting to Support — Warm Right Ltd</title>
  <link rel="icon" href="assets/images/favicon.png">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/header.css">
  <style>
    body.emergency-page {
        background: #f4f7f9;
        font-family: 'Segoe UI', Arial, sans-serif;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        margin: 0;
    }
    .emergency-header {
        background: #062940; /* Brand Navy[cite: 1] */
        color: white;
        padding: 20px;
        text-align: center;
        border-bottom: 4px solid #ffd166; /* Brand Gold[cite: 1] */
    }
    .emergency-header img { height: 55px; }
    
    .emergency-container {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    .emergency-card {
        background: white;
        max-width: 500px;
        width: 100%;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        text-align: center;
        border-top: 6px solid #ffd166;
    }

    .loader-wrapper {
        position: relative;
        width: 120px;
        height: 120px;
        margin: 0 auto 25px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .spinner {
        position: absolute;
        width: 100%;
        height: 100%;
        border: 8px solid #f0f0f0;
        border-top: 8px solid #2b6777; /* Brand Teal[cite: 1] */
        border-radius: 50%;
        animation: spin 1.5s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    .call-inner-btn {
        width: 80px;
        height: 80px;
        background-color: #28a745;
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        font-size: 2rem;
        box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4);
        transition: transform 0.2s ease, background-color 0.2s ease;
        z-index: 2;
        border: none;
        cursor: pointer;
    }
    .call-inner-btn:hover { background-color: #218838; transform: scale(1.05); }

    .emergency-card h2 { color: #062940; margin-bottom: 15px; font-size: 1.8rem; }
    .emergency-card p { color: #555; line-height: 1.6; margin-bottom: 30px; font-size: 1.1rem; }

    .btn {
        width: 100%;
        padding: 18px;
        border-radius: 10px;
        font-weight: bold;
        text-decoration: none;
        cursor: pointer;
        border: none;
        font-size: 1.1rem;
        transition: all 0.3s ease;
        display: block;
        background: #e9ecef; 
        color: #495057;
    }
    .btn:hover { background: #dee2e6; }
    #cancel-countdown { font-weight: bold; color: #2b6777; }
  </style>
</head>
<body class="emergency-page">

  <header class="emergency-header">
    <div class="header-container">
      <img src="assets/images/logo.png" alt="Warm Right Ltd">
    </div>
  </header>

  <div class="emergency-container">
    <div class="emergency-card">
      
      <!-- READY STATE -->
      <div id="readyState">
        <div class="loader-wrapper">
            <div class="spinner"></div>
            <button type="button" class="call-inner-btn" id="mainCallBtn" aria-label="Call Now">📞</button>
        </div>
        <h2>Press to connect</h2>
        <p>Press the button above to connect to <br><strong>Warm Right Support</strong></p>
        <button type="button" id="cancelBtn" class="btn">Cancel Call</button>
      </div>

      <!-- CONNECTING STATE -->
      <div id="connectingState" style="display:none;">
        <div class="loader-wrapper">
            <div class="spinner"></div>
        </div>
        <h2>Connecting call...</h2>
        <p>Your dialer is opening now. Please stay on the line.</p>
      </div>

      <!-- CANCELLED STATE -->
      <div id="cancelledState" style="display:none;">
        <h2 style="color: #dc3545;">Call Cancelled</h2>
        <p>Returning to the main site in <span id="cancel-countdown">3</span> seconds...</p>
      </div>

    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
        const readyState = document.getElementById('readyState');
        const connectingState = document.getElementById('connectingState');
        const cancelledState = document.getElementById('cancelledState');
        const cancelCountdownDisplay = document.getElementById('cancel-countdown');
        
        const mainCallBtn = document.getElementById('mainCallBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        
        // 1. Handle the Call Button Press
        mainCallBtn.addEventListener('click', function() {
            window.location.href = "tel:08007566748";
            readyState.style.display = 'none';
            connectingState.style.display = 'block';
            
            // Background redirect to home
            setTimeout(() => { window.location.href = "index.html"; }, 3000);
        });

        // 2. Handle Cancel Button with Auto-Redirect
        cancelBtn.addEventListener('click', function() {
            readyState.style.display = 'none';
            cancelledState.style.display = 'block';

            let cancelSeconds = 3;
            const cancelInterval = setInterval(() => {
                cancelSeconds--;
                if (cancelCountdownDisplay && cancelSeconds >= 0) {
                    cancelCountdownDisplay.textContent = cancelSeconds;
                }
                if (cancelSeconds <= 0) { clearInterval(cancelInterval); }
            }, 1000);

            // Redirect home after 3 seconds
            setTimeout(() => { window.location.href = "index.html"; }, 3000);
        });
    });
  </script>
</body>
</html>
