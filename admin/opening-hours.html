<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening Hours Admin | Warm Right Ltd</title>
      <link rel="icon" href="../assets/images/favicon.png">

  <link rel="stylesheet" href="../assets/css/admin.css">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>window.adminPageTitle = "WarmHub - Opening Hours";</script>
  <script src="../assets/js/admin-include.js"></script>
  
  <style>
    :root { 
      --primary-blue: #004a99; 
      --bg-gray: #f4f7f6; 
      --text-gray: #666; 
      --success-green: #22c55e; 
      --error-red: #ef4444; 
    }
    
    /* 1. Hide body until security check & header load is complete */
    body { 
      font-family: 'Segoe UI', sans-serif; 
      background: var(--bg-gray); 
      margin: 0; 
      padding: 40px; 
      visibility: hidden; 
    }

    /* 2. Header Layout Fix: Counteracts the 40px body padding */
    #admin-header-container {
      margin: -40px -40px 30px -40px; 
    }

    /* Layout Containers */
    .container { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 25px; padding: 0 20px; }
    .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    h2 { color: #333; margin-top: 0; font-size: 20px; border-bottom: 2px solid var(--primary-blue); padding-bottom: 10px; }
    
    /* Routine Table */
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    td { padding: 10px 5px; font-size: 14px; }
    input[type="time"] { padding: 5px; border: 1px solid #ddd; border-radius: 4px; }
    
    /* Calendar Preview */
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 15px; }
    .cal-day { 
      aspect-ratio: 1; border-radius: 6px; display: flex; flex-direction: column; 
      align-items: center; justify-content: center; font-size: 11px; border: 1px solid #eee; 
      cursor: pointer; transition: 0.2s; position: relative; 
    }
    .cal-day:hover { transform: scale(1.05); z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .day-num { font-weight: bold; font-size: 14px; }
    .status-open { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }
    .status-closed { background: #fef2f2; color: #991b1b; border-color: #fecaca; }
    
   

    /* Modal Styling */
    .modal-overlay { 
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; 
    }
    .modal-content { 
      background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.2); position: relative; 
    }
    .close-modal { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; color: #991b1b; }

    #msg { margin-top: 15px; font-size: 13px; text-align: center; font-weight: 600; }
  </style>
</head>
<body>

  <div id="admin-header-container"></div>

  <div class="container">
    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>Standard Routine</h2>
        <div style="text-align: right;">
          <button class="btn-sync" onclick="syncBankHolidays()">🔄 Sync UK Holidays</button>
          <div id="sync-info" style="font-size: 10px; color: #888; margin-top: 4px; line-height: 1.2;">
            Last synced: <span id="last-sync-date">Never</span><br>
            Recommended: <span id="next-sync-date">Now</span>
          </div>
        </div>
      </div>
      <form id="routine-form">
        <table>
          <tbody id="routine-body"></tbody>
        </table>
        <button type="button" class="btn-primary" onclick="saveRoutine()">Save Weekly Schedule</button>
      </form>
      <p id="msg"></p>
    </div>

    <div class="card">
      <h2>4-Week Preview</h2>
      <p style="font-size: 12px; color: #777; margin-bottom: 10px;">
        Visualizing effective hours. <strong>Click any day to change hours or close/open for the day.</strong>
      </p>
      <div class="calendar-grid" id="calendar-view"></div>
      <div style="margin-top: 20px; font-size: 12px; display: flex; gap: 15px; justify-content: center;">
        <span><span style="color:var(--success-green)">●</span> Open</span>
        <span><span style="color:var(--error-red)">●</span> Closed/Holiday</span>
      </div>
    </div>
  </div>

  <div id="override-modal" class="modal-overlay">
    <div class="modal-content">
      <span class="close-modal" onclick="closeModal()">&times;</span>
      <h2>Edit Override</h2>
      <p id="modal-date-display" style="font-weight: bold; color: var(--primary-blue);"></p>
      
      <label style="font-size: 13px; font-weight: 600; display: block; margin-top: 15px;">Reason</label>
      <input type="text" id="modal-reason" placeholder="e.g. Bank Holiday" style="width:100%; padding:10px; margin: 5px 0 15px; border:1px solid #ddd; border-radius:6px; box-sizing: border-box;">

      <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 15px;">
        <input type="checkbox" id="modal-closed" onchange="toggleModalTimes()"> 
        <label for="modal-closed" style="font-size: 14px; font-weight: 600;">Closed all day?</label>
      </div>

      <div id="modal-time-wrap" style="display: flex; gap: 10px; margin-bottom: 20px;">
        <div style="flex:1">
          <label style="font-size: 11px; font-weight: 600; display: block;">Open</label>
          <input type="time" id="modal-open" style="width:100%; padding:8px;">
        </div>
        <div style="flex:1">
          <label style="font-size: 11px; font-weight: 600; display: block;">Close</label>
          <input type="time" id="modal-close" style="width:100%; padding:8px;">
        </div>
      </div>

      <button class="btn-primary" onclick="saveModalOverride()">Save Changes</button>
      <button class="btn-outline" style="width: 100%; margin-top: 10px; border: none; color: var(--error-red); font-size: 12px;" onclick="deleteOverride()">Remove Override</button>
    </div>
  </div>

  <script>
    /* 1. INITIALIZATION & SECURITY */
    let db;
    const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
    let routineData = [];
    let overrides = [];
    let activeModalDate = "";

    async function checkSecurity() {
      const lib = window.supabase || window.Supabase;
      if (!lib) { setTimeout(checkSecurity, 50); return; }

      // Assign to window.db so the admin-include.js logout function can see it
      window.db = lib.createClient(
        'https://axampuprcnauxbbijmmt.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4YW1wdXByY25hdXhiYmlqbW10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NDgyNjUsImV4cCI6MjA5MzMyNDI2NX0.Er1hMQbaXnR4hzHfR2my0SmtwUcUs49HaCVqYwMBHuQ'
      );

      const { data: { session } } = await window.db.auth.getSession();
      
      if (!session) { 
        window.location.href = 'login.html'; 
        return; 
      }
      
      // LOAD THE MODULAR HEADER
      await window.loadAdminHeader(session);
      
      // REVEAL PAGE
      document.body.style.visibility = 'visible';
      
      // RUN PAGE CONTENT INIT
      init();
    }

    async function init() {
      await loadData();
      renderRoutine();
      renderCalendar();
    }

    // Required for the Logout button in the header
    window.handleLogout = async () => {
      await window.db.auth.signOut();
      window.location.href = 'login.html';
    };

    /* 2. HOURS LOGIC */

    async function loadData() {
      const { data: routine } = await window.db.from('business_hours').select('*').order('day_index', { ascending: true });
      const { data: special } = await window.db.from('special_dates').select('*').gte('date', new Date().toISOString().split('T')[0]);
      const { data: meta } = await window.db.from('app_metadata').select('*').eq('key', 'last_holiday_sync').single();
      
      routineData = routine || [];
      overrides = special || [];
      if (meta) updateSyncDisplay(meta.value);
    }

    function updateSyncDisplay(lastSyncIso) {
      const lastSync = new Date(lastSyncIso);
      document.getElementById('last-sync-date').textContent = lastSync.toLocaleDateString();
      const nextRecommended = new Date(lastSync);
      nextRecommended.setMonth(nextRecommended.getMonth() + 6);
      document.getElementById('next-sync-date').textContent = nextRecommended < new Date() ? "Now (Outdated)" : nextRecommended.toLocaleDateString();
    }

    function renderRoutine() {
      const container = document.getElementById('routine-body');
      container.innerHTML = days.map((day, i) => {
        const data = routineData.find(r => r.day_index === i) || { open_time: '08:00', close_time: '17:00', is_closed: false };
        return `
          <tr>
            <td><strong>${day}</strong></td>
            <td><input type="time" id="open-${i}" value="${data.open_time.substring(0,5)}" ${data.is_closed ? 'disabled' : ''}></td>
            <td><input type="time" id="close-${i}" value="${data.close_time.substring(0,5)}" ${data.is_closed ? 'disabled' : ''}></td>
            <td><input type="checkbox" id="closed-${i}" onchange="toggleDay(${i})" ${data.is_closed ? 'checked' : ''}> Closed</td>
          </tr>
        `;
      }).join('');
    }

    function toggleDay(i) {
      const isClosed = document.getElementById(`closed-${i}`).checked;
      document.getElementById(`open-${i}`).disabled = isClosed;
      document.getElementById(`close-${i}`).disabled = isClosed;
    }

    async function saveRoutine() {
      const updates = days.map((_, i) => ({
        day_index: i,
        day_name: days[i],
        open_time: document.getElementById(`open-${i}`).value,
        close_time: document.getElementById(`close-${i}`).value,
        is_closed: document.getElementById(`closed-${i}`).checked
      }));
      const { error } = await window.db.from('business_hours').upsert(updates);
      if (error) alert(error.message); else location.reload();
    }

    async function syncBankHolidays() {
      document.getElementById('msg').textContent = "Fetching UK Bank Holidays...";
      try {
        const response = await fetch('https://www.gov.uk/bank-holidays.json');
        const data = await response.json();
        const holidays = data['england-and-wales'].events;
        const holidayUpdates = holidays.map(h => ({ date: h.date, reason: h.title, is_closed: true }));
        const { error } = await window.db.from('special_dates').upsert(holidayUpdates);
        if (error) throw error;
        await window.db.from('app_metadata').upsert({ key: 'last_holiday_sync', value: new Date().toISOString() });
        alert("Holidays synced successfully!");
        location.reload();
      } catch (err) { alert("Sync failed: " + err.message); }
    }

    function renderCalendar() {
      const view = document.getElementById('calendar-view');
      view.innerHTML = "";
      const today = new Date();
      for (let i = 0; i < 28; i++) {
        const date = new Date(today);
        date.setDate(today.getDate() + i);
        const dateStr = date.toISOString().split('T')[0];
        const dayIdx = date.getDay();
        const override = overrides.find(o => o.date === dateStr);
        const routine = routineData.find(r => r.day_index === dayIdx);
        const isClosed = override ? override.is_closed : (routine ? routine.is_closed : false);
        const label = override ? override.reason.substring(0,8) : (isClosed ? 'Closed' : 'Open');
        view.innerHTML += `
          <div class="cal-day ${isClosed ? 'status-closed' : 'status-open'}" onclick="openOverrideModal('${dateStr}')">
            <span style="font-size:9px">${days[dayIdx].substring(0,3)}</span>
            <span class="day-num">${date.getDate()}</span>
            <span>${label}</span>
          </div>
        `;
      }
    }

    function openOverrideModal(dateStr) {
      activeModalDate = dateStr;
      const override = overrides.find(o => o.date === dateStr);
      document.getElementById('modal-date-display').textContent = new Date(dateStr).toDateString();
      document.getElementById('modal-reason').value = override ? override.reason : "";
      document.getElementById('modal-closed').checked = override ? override.is_closed : true;
      document.getElementById('modal-open').value = (override && override.open_time) ? override.open_time.substring(0,5) : "08:00";
      document.getElementById('modal-close').value = (override && override.close_time) ? override.close_time.substring(0,5) : "17:00";
      toggleModalTimes();
      document.getElementById('override-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('override-modal').style.display = 'none'; }
    function toggleModalTimes() {
      const isClosed = document.getElementById('modal-closed').checked;
      document.getElementById('modal-time-wrap').style.display = isClosed ? 'none' : 'flex';
    }

    async function saveModalOverride() {
      const { error } = await window.db.from('special_dates').upsert({
        date: activeModalDate,
        reason: document.getElementById('modal-reason').value || "Override",
        is_closed: document.getElementById('modal-closed').checked,
        open_time: document.getElementById('modal-closed').checked ? null : document.getElementById('modal-open').value,
        close_time: document.getElementById('modal-closed').checked ? null : document.getElementById('modal-close').value
      });
      if (error) alert(error.message); else { closeModal(); init(); }
    }

    async function deleteOverride() {
      if (!confirm("Remove this override? It will revert to your standard routine.")) return;
      const { error } = await window.db.from('special_dates').delete().eq('date', activeModalDate);
      if (error) alert(error.message); else { closeModal(); init(); }
    }

    // RUN ON LOAD
    checkSecurity();
  </script>
</body>
</html>
