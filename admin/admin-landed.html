<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <style>
    body { font-family: sans-serif; padding: 40px; background: #f0f2f5; }

    .logout-btn { background: #ef4444; color: white; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; }
  /* 1. Hide the body by default to prevent "peeking" before login check */
  body { font-family: sans-serif; padding: 40px; background: #f0f2f5; visibility: hidden; }
  .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
  .card { background: white; padding: 20px; border-radius: 8px; text-align: center; text-decoration: none; color: #333; border: 1px solid #ddd; transition: 0.2s; }
  .card:hover { transform: translateY(-5px); border-color: #3b82f6; }

  <script>
  /*SECURE*/
  let db;

  async function checkSecurity() {
    // Handling the Supabase library naming quirk
    const lib = window.supabase || window.Supabase;

    if (!lib) {
      setTimeout(checkSecurity, 50); 
      return;
    }

    // Initialize using 'db' to avoid naming conflicts
    db = lib.createClient(
      'https://axampuprcnauxbbijmmt.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4YW1wdXByY25hdXhiYmlqbW10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NDgyNjUsImV4cCI6MjA5MzMyNDI2NX0.Er1hMQbaXnR4hzHfR2my0SmtwUcUs49HaCVqYwMBHuQ'
    );

    const { data: { session }, error } = await db.auth.getSession();

    if (error || !session) {
      window.location.href = 'login.html';
    } else {
      console.log("Verified as:", session.user.email);
      document.body.style.visibility = 'visible'; // Reveal the page
    }
  }

  // Define Logout globally so the button can see it
  window.logout = async () => {
    if (db) {
      await db.auth.signOut();
      window.location.href = 'login.html';
    } else {
      window.location.href = 'login.html';
    }
  };

  // Run security check immediately
  checkSecurity();
  </script>
