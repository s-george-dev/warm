<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Warm Right Ltd</title>
  
  <link rel="stylesheet" href="../assets/css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>window.adminPageTitle = "WarmHub";</script>
  <script src="../assets/js/admin-include.js"></script>

  <style>
    /* 1. Hide the body by default to prevent "peeking" */
    body { 
      font-family: 'Segoe UI', sans-serif; 
      padding: 40px; 
      background: #f0f2f5; 
      visibility: hidden; 
      margin: 0;
    }

    /* 2. Fix for Header Layout: This ensures the nav hits the edges */
    #admin-header-container {
      margin: -40px -40px 30px -40px; 
    }

    /* Dashboard Grid Styling */
    .menu-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
      gap: 25px; 
      margin-top: 30px; 
    }
    
    .card { 
      background: white; 
      padding: 30px; 
      border-radius: 12px; 
      text-align: center; 
      text-decoration: none; 
      color: #333; 
      border: 1px solid #ddd; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      transition: 0.3s; 
    }
    
    .card:hover { 
      transform: translateY(-5px); 
      border-color: #004a99; 
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }
    
    .card h3 { color: #004a99; margin-bottom: 10px; }
    .card p { color: #666; font-size: 14px; margin: 0; }
  </style>
</head>
<body>

  <div id="admin-header-container"></div>

  <div class="menu-grid">
    <a href="inventory.html" class="card">
  <div style="font-size: 40px; margin-bottom: 10px;">📦</div>
  <h3>Inventory System</h3>
  <p>Manage folders, items, and stock levels</p>
</a>
    <a href="rates.html" class="card">
      <div style="font-size: 40px; margin-bottom: 10px;">💰</div>
      <h3>Manage Rates</h3>
      <p>Edit prices and descriptions</p>
    </a>

    <a href="testimonials-admin.html" class="card">
      <div style="font-size: 40px; margin-bottom: 10px;">👤</div>
      <h3>Manage Testimonials</h3>
      <p>Upload text or photo reviews from customers</p>
    </a>

    <a href="settings-admin.html" class="card">
      <div style="font-size: 40px; margin-bottom: 10px;">⚙️</div>
      <h3>Account Settings</h3>
      <p>Change your admin password</p>
    </a>
    
    <a href="opening-hours.html" class="card">
      <div style="font-size: 40px; margin-bottom: 10px;">⏰</div>
      <h3>Opening Hours</h3>
      <p>Change Warm Right's Business Hours</p>
    </a>
  </div>

      const lib = window.supabase || window.Supabase;

      if (!lib) {
        setTimeout(checkSecurity, 50); 
        return;
      }

      // Initialize global db for use in admin-include.js logout
      window.db = lib.createClient(
        'https://axampuprcnauxbbijmmt.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4YW1wdXByY25hdXhiYmlqbW10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NDgyNjUsImV4cCI6MjA5MzMyNDI2NX0.Er1hMQbaXnR4hzHfR2my0SmtwUcUs49HaCVqYwMBHuQ'
      );

      const { data: { session }, error } = await window.db.auth.getSession();

      if (error || !session) {
        window.location.href = 'login.html';
      } else {
        console.log("Session active:", session.user.email);
        
        // --- TRIGGER THE HEADER LOAD ---
        // This pushes the user session into the nav bar logic
        await window.loadAdminHeader(session); 
        
        // Final reveal of the page content
        document.body.style.visibility = 'visible'; 
      }
    }

    // Define Logout for use outside the header if needed
    window.logout = async () => {
      if (window.db) {
        await window.db.auth.signOut();
        window.location.href = 'login.html';
      }
    };

    // Run security check
    checkSecurity();
  </script>
</body>
</html>
