<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Warm Right Ltd</title>
      <link rel="icon" href="../assets/images/favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { 
      --primary-blue: #004a99; 
      --bg-gray: #f4f7f6; 
      --text-gray: #666;
      --error-red: #ef4444;
      --success-green: #22c55e;
    }
    
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg-gray); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    
    .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 420px; text-align: center; box-sizing: border-box; }
    
    h2 { color: #333; margin-bottom: 5px; }
    .subtext { color: var(--text-gray); font-size: 14px; margin-bottom: 25px; }

    label { display: block; text-align: left; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 5px; }

    .password-wrapper { position: relative; width: 100%; margin-bottom: 15px; }
    
    input { 
      width: 100%; padding: 12px; padding-right: 48px; 
      border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; 
      font-size: 15px; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--primary-blue); }
    
    .toggle-eye {
      position: absolute; right: 2px; top: 50%; transform: translateY(-50%);
      height: 38px; width: 44px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      border: none; background: none; opacity: 0.5; transition: 0.2s; padding: 0;
    }
    .toggle-eye:hover { opacity: 1; }
    .toggle-eye svg { width: 24px; height: 24px; fill: #555; }

    .validation-list { text-align: left; margin: 20px 0; padding: 0; list-style: none; }
    .validation-list li { font-size: 13px; color: var(--text-gray); display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .validation-list li.valid { color: var(--success-green); font-weight: 600; }
    .validation-list li.invalid { color: var(--error-red); }
    .status-icon { font-size: 14px; width: 16px; display: inline-block; text-align: center; }

    button#resetBtn, button#mfaVerifyBtn { width: 100%; padding: 14px; background: var(--primary-blue); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
    button:disabled { background: #cbd5e1; cursor: not-allowed; }
    
    #msg { margin-top: 15px; font-size: 14px; font-weight: 600; min-height: 20px; line-height: 1.4; }

    /* MFA Section Styling */
    #mfa-section { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
    .mfa-input { text-align: center; letter-spacing: 4px; font-size: 24px; font-weight: bold; width: 100%; box-sizing: border-box; padding: 10px; margin-bottom: 15px; }
  </style>
</head>
<body>

  <div class="card">
    <img src="../assets/images/logo.png" alt="Warm Right Ltd" style="height: 50px; margin-bottom: 20px;">
    
    <div id="password-form">
      <h2>Reset Password</h2>
      <p class="subtext">Update your account security settings.</p>
      
      <label>New Password</label>
      <div class="password-wrapper">
        <input type="password" id="new-password" placeholder="Enter your new password" onkeyup="validatePassword()">
        <button type="button" class="toggle-eye" onclick="toggleVisibility('new-password', this)">
          <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        </button>
      </div>

      <label>Confirm Password</label>
      <div class="password-wrapper">
        <input type="password" id="confirm-password" placeholder="Repeat your new password">
        <button type="button" class="toggle-eye" onclick="toggleVisibility('confirm-password', this)">
          <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        </button>
      </div>

      <ul class="validation-list" id="reqList">
        <li id="req-length" class="invalid"><span class="status-icon">✘</span> Minimum 6 characters</li>
        <li id="req-cap" class="invalid"><span class="status-icon">✘</span> One capital letter</li>
        <li id="req-num" class="invalid"><span class="status-icon">✘</span> One number</li>
        <li id="req-sym" class="invalid"><span class="status-icon">✘</span> One special symbol</li>
      </ul>

      <button id="resetBtn" disabled>Update & Go to Login</button>
    </div>

    <!-- MFA Section -->
    <div id="mfa-section">
      <h2>MFA Verification Required</h2>
      <p class="subtext">Enter the 6-digit code from your authenticator app to authorize this change.</p>
      <input type="text" id="mfa-code" class="mfa-input" placeholder="000 000" maxlength="7">
      <button id="mfaVerifyBtn">Verify & Update Password</button>
    </div>

    <p id="msg"></p>
  </div>

  <script>
    const db = supabase.createClient('https://axampuprcnauxbbijmmt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4YW1wdXByY25hdXhiYmlqbW10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NDgyNjUsImV4cCI6MjA5MzMyNDI2NX0.Er1hMQbaXnR4hzHfR2my0SmtwUcUs49HaCVqYwMBHuQ');

    const openPath = "M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z";
    const closedPath = "M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.82l2.92 2.92c1.51-1.26 2.7-2.89 3.44-4.74-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z";

    let currentFactorId = null;

    function toggleVisibility(id, btn) {
      const input = document.getElementById(id);
      const path = btn.querySelector('path');
      if (input.type === 'password') {
        input.type = 'text';
        path.setAttribute('d', closedPath);
      } else {
        input.type = 'password';
        path.setAttribute('d', openPath);
      }
    }

    function validatePassword() {
      const val = document.getElementById('new-password').value;
      const btn = document.getElementById('resetBtn');
      const tests = {
        length: val.length >= 6,
        cap: /[A-Z]/.test(val),
        num: /\d/.test(val),
        sym: /[!@#$%^&*(),.?":{}|<> ]/.test(val)
      };

      Object.keys(tests).forEach(key => {
        const el = document.getElementById(`req-${key}`);
        const icon = el.querySelector('.status-icon');
        if (tests[key]) {
          el.className = 'valid';
          icon.textContent = '✔';
        } else {
          el.className = 'invalid';
          icon.textContent = '✘';
        }
      });

      const allValid = Object.values(tests).every(v => v === true);
      btn.disabled = !allValid;
    }

    // --- REFINED RESET LOGIC ---
    document.getElementById('resetBtn').onclick = async (e) => {
      e.preventDefault();
      const pass = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;
      const msg = document.getElementById('msg');

      if (pass !== confirm) {
        msg.style.color = "var(--error-red)";
        msg.textContent = "Passwords do not match!";
        return;
      }

      msg.style.color = "var(--primary-blue)";
      msg.textContent = "Attempting update...";

      // Attempt update first
      const { error } = await db.auth.updateUser({ password: pass });

      if (error) {
        // If server demands AAL2 (MFA), show the verification UI
        if (error.message.includes('AAL2')) {
          const { data: factors } = await db.auth.mfa.listFactors();
          const activeFactor = factors.totp.find(f => f.status === 'verified');
          
          if (activeFactor) {
            currentFactorId = activeFactor.id;
            document.getElementById('password-form').style.display = 'none';
            document.getElementById('mfa-section').style.display = 'block';
            msg.textContent = "";
            return;
          }
        }
        
        msg.style.color = "var(--error-red)";
        msg.textContent = error.message;
      } else {
        // Direct success (if user has no MFA)
        await db.auth.signOut();
        msg.style.color = "var(--success-green)";
        msg.textContent = "Success! Password updated. Redirecting...";
        setTimeout(() => { window.location.replace('login.html'); }, 2000);
      }
    };

    // --- MFA VERIFICATION LOGIC ---
    document.getElementById('mfaVerifyBtn').onclick = async () => {
      const code = document.getElementById('mfa-code').value.replace(/\s/g, '');
      const msg = document.getElementById('msg');
      const pass = document.getElementById('new-password').value;

      if (code.length < 6) {
        msg.style.color = "var(--error-red)";
        msg.textContent = "Please enter the full 6-digit code.";
        return;
      }

      msg.style.color = "var(--primary-blue)";
      msg.textContent = "Verifying identity...";

      const { data: challenge, error: challengeError } = await db.auth.mfa.challenge({ factorId: currentFactorId });
      if (challengeError) { 
        msg.style.color = "var(--error-red)"; 
        msg.textContent = "Session expired. Please refresh and try again."; 
        return; 
      }

      const { error: verifyError } = await db.auth.mfa.verify({ factorId: currentFactorId, challengeId: challenge.id, code });
      
      if (verifyError) {
        msg.style.color = "var(--error-red)";
        msg.textContent = "Invalid MFA code. Try again.";
      } else {
        // Identity verified to AAL2, now retry the password update
        const { error: updateError } = await db.auth.updateUser({ password: pass });
        
        if (updateError) {
          msg.style.color = "var(--error-red)";
          msg.textContent = updateError.message;
        } else {
          await db.auth.signOut();
          msg.style.color = "var(--success-green)";
          msg.textContent = "Identity verified. Password updated successfully! Redirecting...";
          setTimeout(() => { window.location.replace('login.html'); }, 2000);
        }
      }
    };
  </script>
</body>
</html>
